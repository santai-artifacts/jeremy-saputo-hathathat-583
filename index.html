<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangmana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #FFB6D9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .game-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            border: 2px solid #ddd;
            border-radius: 10px;
            background: #f9f9f9;
            max-width: 100%;
            height: auto;
        }

        .game-info {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .word-display {
            background: #f5f5f5;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .word-display p {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .word {
            font-size: 2.5em;
            letter-spacing: 15px;
            color: #667eea;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }

        .guesses {
            margin-top: 20px;
        }

        .guesses-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .guesses-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .guessed-letter {
            background: #e74c3c;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .stats {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #667eea;
            font-weight: bold;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(35px, 1fr));
            gap: 8px;
        }

        .key-btn {
            padding: 10px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            transition: all 0.3s ease;
            color: #333;
        }

        .key-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .key-btn:disabled {
            background: #ddd;
            color: #999;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .message {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.win {
            color: #27ae60;
        }

        .message.lose {
            color: #e74c3c;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button.reset-btn, button.new-word-btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .reset-btn {
            background: #667eea;
            color: white;
        }

        .reset-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .new-word-btn {
            background: #764ba2;
            color: white;
        }

        .new-word-btn:hover {
            background: #63408a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        @media (max-width: 700px) {
            .game-wrapper {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .word {
                font-size: 1.8em;
                letter-spacing: 8px;
            }

            .container {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>let's hang woman</h1>
        <p class="subtitle">Guess the word before the hangman is complete</p>

        <div class="game-wrapper">
            <div class="canvas-wrapper">
                <canvas id="hangman-canvas" width="280" height="350"></canvas>
            </div>

            <div class="game-info">
                <div class="word-display">
                    <p>Word</p>
                    <div class="word" id="word-display">_ _ _ _ _</div>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Wrong Guesses:</span>
                        <span class="stat-value"><span id="wrong-count">0</span> / 6</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Remaining:</span>
                        <span class="stat-value" id="remaining">26</span>
                    </div>
                </div>

                <div class="guesses">
                    <div class="guesses-label">Wrong Letters</div>
                    <div class="guesses-container" id="guesses-container"></div>
                </div>

                <div id="message" class="message"></div>

                <div class="keyboard" id="keyboard"></div>

                <div class="buttons">
                    <button class="reset-btn" onclick="resetGame()">New Game</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('hangman-canvas');
        const ctx = canvas.getContext('2d');

        const words = [
            'JAVASCRIPT', 'PROGRAMMING', 'HANGMAN', 'CREATIVE', 'IMAGINE',
            'WONDERFUL', 'BRILLIANT', 'ADVENTURE', 'DISCOVERY', 'HARMONY',
            'BUTTERFLY', 'RAINBOW', 'MOONLIGHT', 'SYMPHONY', 'PARADISE'
        ];

        let selectedWord = '';
        let guessedLetters = [];
        let wrongGuesses = [];
        let gameOver = false;

        const drawCharacter = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const wrongCount = wrongGuesses.length;

            // Gallows
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 4;
            // Base
            ctx.beginPath();
            ctx.moveTo(20, 320);
            ctx.lineTo(150, 320);
            ctx.stroke();
            // Vertical post
            ctx.beginPath();
            ctx.moveTo(80, 320);
            ctx.lineTo(80, 40);
            ctx.stroke();
            // Top beam
            ctx.beginPath();
            ctx.moveTo(80, 40);
            ctx.lineTo(200, 40);
            ctx.stroke();
            // Rope
            ctx.beginPath();
            ctx.moveTo(200, 40);
            ctx.lineTo(200, 70);
            ctx.stroke();

            // Pink top hat (always drawn)
            ctx.fillStyle = '#FF69B4';
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#FF1493';
            // Hat brim
            ctx.beginPath();
            ctx.ellipse(200, 65, 35, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // Hat sides
            ctx.beginPath();
            ctx.moveTo(165, 65);
            ctx.lineTo(170, 40);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(235, 65);
            ctx.lineTo(230, 40);
            ctx.stroke();
            // Hat crown
            ctx.beginPath();
            ctx.ellipse(200, 40, 30, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // Hat band
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(165, 60, 70, 4);

            // Face (always drawn)
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.fillStyle = '#FFD9B3';
            ctx.beginPath();
            ctx.arc(200, 100, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Sunglasses (always drawn)
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#333';
            ctx.fillStyle = 'rgba(100, 100, 100, 0.5)';
            // Left lens
            ctx.beginPath();
            ctx.ellipse(185, 92, 10, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // Right lens
            ctx.beginPath();
            ctx.ellipse(215, 92, 10, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            // Bridge
            ctx.beginPath();
            ctx.moveTo(195, 92);
            ctx.lineTo(205, 92);
            ctx.stroke();
            // Left temple
            ctx.beginPath();
            ctx.moveTo(175, 92);
            ctx.lineTo(160, 95);
            ctx.stroke();
            // Right temple
            ctx.beginPath();
            ctx.moveTo(225, 92);
            ctx.lineTo(240, 95);
            ctx.stroke();

            // Mouth (always drawn) - smiling with teeth and tongue out
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(200, 105, 8, 0, Math.PI, false);
            ctx.stroke();
            // Teeth
            ctx.fillStyle = 'white';
            ctx.fillRect(192, 105, 16, 4);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(196, 105);
            ctx.lineTo(196, 109);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(200, 105);
            ctx.lineTo(200, 109);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(204, 105);
            ctx.lineTo(204, 109);
            ctx.stroke();
            // Tongue sticking out
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.ellipse(200, 118, 5, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body - appears on 1st wrong guess
            if (wrongCount >= 1) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(200, 125);
                ctx.lineTo(200, 180);
                ctx.stroke();
            }

            // Left arm - appears on 2nd wrong guess
            if (wrongCount >= 2) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(200, 140);
                ctx.lineTo(165, 160);
                ctx.stroke();
            }

            // Right arm - appears on 3rd wrong guess
            if (wrongCount >= 3) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(200, 140);
                ctx.lineTo(235, 160);
                ctx.stroke();
            }

            // Left leg - appears on 4th wrong guess
            if (wrongCount >= 4) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(200, 180);
                ctx.lineTo(175, 220);
                ctx.stroke();
            }

            // Right leg - appears on 5th wrong guess
            if (wrongCount >= 5) {
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(200, 180);
                ctx.lineTo(225, 220);
                ctx.stroke();
            }

            // X eyes on death - appears on 6th wrong guess
            if (wrongCount >= 6) {
                ctx.strokeStyle = '#e74c3c';
                ctx.lineWidth = 3;
                // Left X
                ctx.beginPath();
                ctx.moveTo(185, 85);
                ctx.lineTo(195, 99);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(195, 85);
                ctx.lineTo(185, 99);
                ctx.stroke();
                // Right X
                ctx.beginPath();
                ctx.moveTo(205, 85);
                ctx.lineTo(215, 99);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(215, 85);
                ctx.lineTo(205, 99);
                ctx.stroke();
            }
        };

        const createKeyboard = () => {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            letters.forEach(letter => {
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = 'key-btn';
                btn.onclick = () => guessLetter(letter, btn);
                if (guessedLetters.includes(letter)) {
                    btn.disabled = true;
                }
                keyboard.appendChild(btn);
            });
        };

        const guessLetter = (letter, btnElement) => {
            if (gameOver || guessedLetters.includes(letter)) return;

            guessedLetters.push(letter);
            btnElement.disabled = true;

            if (!selectedWord.includes(letter)) {
                wrongGuesses.push(letter);
            }

            updateDisplay();
            drawCharacter();
            checkGameStatus();
        };

        const updateDisplay = () => {
            const wordDisplay = selectedWord.split('').map(letter =>
                guessedLetters.includes(letter) ? letter : '_'
            ).join(' ');
            document.getElementById('word-display').textContent = wordDisplay;

            const guessesContainer = document.getElementById('guesses-container');
            guessesContainer.innerHTML = wrongGuesses.map(letter =>
                `<span class="guessed-letter">${letter}</span>`
            ).join('');

            document.getElementById('wrong-count').textContent = wrongGuesses.length;
            document.getElementById('remaining').textContent = 26 - guessedLetters.length;
        };

        const checkGameStatus = () => {
            const wordComplete = selectedWord.split('').every(letter => guessedLetters.includes(letter));
            const isLose = wrongGuesses.length >= 6;

            const messageEl = document.getElementById('message');

            if (wordComplete) {
                messageEl.textContent = 'You Won!';
                messageEl.className = 'message win';
                gameOver = true;
                disableAllButtons();
            } else if (isLose) {
                messageEl.textContent = `Game Over! Word: ${selectedWord}`;
                messageEl.className = 'message lose';
                gameOver = true;
                disableAllButtons();
            }
        };

        const disableAllButtons = () => {
            document.querySelectorAll('.key-btn').forEach(btn => btn.disabled = true);
        };

        const resetGame = () => {
            selectedWord = words[Math.floor(Math.random() * words.length)];
            guessedLetters = [];
            wrongGuesses = [];
            gameOver = false;
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
            createKeyboard();
            updateDisplay();
            drawCharacter();
        };

        // Initialize game
        resetGame();
    </script>
</body>
</html>
